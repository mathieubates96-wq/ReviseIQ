<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — ReviseIQ</title>
  <meta name="description" content="ReviseIQ - Free Leaving Cert study tool with past papers, AI quizzes and topic trends" />
  <meta name="keywords" content="Leaving Cert, LC papers, SEC papers, Leaving Certificate study, LC quiz, Irish students" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <main class="auth-page">
    <div class="auth-wrap">

      <!-- Logo -->
      <a href="index.html" class="auth-logo-link">
        <span class="auth-logo-icon">R</span>
        <span class="auth-logo-name">ReviseIQ</span>
      </a>

      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-tagline">Log in to continue your Leaving Cert revision.</p>

        <div class="auth-error" id="authError" role="alert"></div>

        <form class="auth-form" id="loginForm" novalidate>

          <div class="auth-field">
            <label class="auth-label" for="email">Email address</label>
            <input class="auth-input" type="email" id="email"
                   name="email" placeholder="you@example.com"
                   autocomplete="email" required />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" type="password" id="password"
                   name="password" placeholder="Your password"
                   autocomplete="current-password" required />
          </div>

          <button class="auth-btn" type="submit" id="submitBtn">Log In</button>

        </form>

        <div class="auth-switch">
          Don't have an account? <a href="signup.html">Sign up free</a>
        </div>
      </div>

    </div>
  </main>

  <script src="auth.js"></script>
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.getSession()) {
        window.location.href = 'index.html';
        return;
      }

      const form      = document.getElementById('loginForm');
      const errorEl   = document.getElementById('authError');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Logging in…';

        const result = await Auth.login(email, password);

        if (result.error) {
          errorEl.textContent   = result.error;
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Log In';
          return;
        }

        const next = new URLSearchParams(location.search).get('next') || 'index.html';
        window.location.href = next;
      });
    });
  </script>
</body>
</html>
