<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — ReviseIQ</title>
  <meta name="description" content="ReviseIQ - Free Leaving Cert study tool with past papers, AI quizzes and topic trends" />
  <meta name="keywords" content="Leaving Cert, LC papers, SEC papers, Leaving Certificate study, LC quiz, Irish students" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <main class="auth-page">
    <div class="auth-wrap auth-wrap--wide">

      <!-- Logo -->
      <a href="index.html" class="auth-logo-link">
        <span class="auth-logo-icon">R</span>
        <span class="auth-logo-name">ReviseIQ</span>
      </a>

      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-tagline">Free forever. Track your progress and ace the Leaving Cert.</p>

        <div class="auth-error" id="authError" role="alert"></div>

        <form class="auth-form" id="signupForm" novalidate>

          <div class="auth-field">
            <label class="auth-label" for="firstName">First name</label>
            <input class="auth-input" type="text" id="firstName"
                   name="firstName" placeholder="Aoife"
                   autocomplete="given-name" required />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="lastName">Last name</label>
            <input class="auth-input" type="text" id="lastName"
                   name="lastName" placeholder="Murphy"
                   autocomplete="family-name" />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="email">Email address</label>
            <input class="auth-input" type="email" id="email"
                   name="email" placeholder="you@example.com"
                   autocomplete="email" required />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" type="password" id="password"
                   name="password" placeholder="At least 6 characters"
                   autocomplete="new-password" required minlength="6" />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="confirmPassword">Confirm password</label>
            <input class="auth-input" type="password" id="confirmPassword"
                   name="confirmPassword" placeholder="Re-enter password"
                   autocomplete="new-password" required />
          </div>

          <div class="auth-field">
            <label class="auth-label">
              Your subjects
              <span class="auth-label-hint">— pick all that apply</span>
            </label>
            <div class="subject-picker" id="subjectPicker">
              <button type="button" class="subject-pill" data-subject="irish">🇮🇪 Irish</button>
              <button type="button" class="subject-pill" data-subject="english">📖 English</button>
              <button type="button" class="subject-pill" data-subject="maths">📐 Maths</button>
              <button type="button" class="subject-pill" data-subject="biology">🧬 Biology</button>
              <button type="button" class="subject-pill" data-subject="chemistry">⚗️ Chemistry</button>
              <button type="button" class="subject-pill" data-subject="physics">🔭 Physics</button>
              <button type="button" class="subject-pill" data-subject="history">🏛️ History</button>
              <button type="button" class="subject-pill" data-subject="geography">🌍 Geography</button>
              <button type="button" class="subject-pill" data-subject="business">💼 Business</button>
              <button type="button" class="subject-pill" data-subject="french">🥐 French</button>
              <button type="button" class="subject-pill" data-subject="spanish">🇪🇸 Spanish</button>
              <button type="button" class="subject-pill" data-subject="accounting">🧾 Accounting</button>
              <button type="button" class="subject-pill" data-subject="economics">📉 Economics</button>
              <button type="button" class="subject-pill" data-subject="art">🎨 Art</button>
              <button type="button" class="subject-pill" data-subject="music">🎵 Music</button>
            </div>
          </div>

          <button class="auth-btn" type="submit" id="submitBtn">Create Account</button>

        </form>

        <div class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>

    </div>
  </main>

  <script src="auth.js"></script>
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.getSession()) {
        window.location.href = 'index.html';
        return;
      }

      const form      = document.getElementById('signupForm');
      const errorEl   = document.getElementById('authError');
      const submitBtn = document.getElementById('submitBtn');

      // Subject picker toggle
      document.querySelectorAll('.subject-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          pill.classList.toggle('selected');
        });
      });

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const firstName       = document.getElementById('firstName').value.trim();
        const lastName        = document.getElementById('lastName').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        const subjects = [...document.querySelectorAll('.subject-pill.selected')]
          .map(p => p.dataset.subject);

        if (password !== confirmPassword) {
          showError('Passwords do not match.');
          return;
        }

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Creating account…';

        const result = await Auth.signup({ firstName, lastName, email, password, subjects });

        if (result.error) {
          showError(result.error);
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
