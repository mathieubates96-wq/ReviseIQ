<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — ReviseIQ</title>
  <meta name="description" content="ReviseIQ - Free Leaving Cert study tool with past papers, AI quizzes and topic trends" />
  <meta name="keywords" content="Leaving Cert, LC papers, SEC papers, Leaving Certificate study, LC quiz, Irish students" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <main class="auth-page">
    <div class="auth-wrap">

      <!-- Logo -->
      <a href="index.html" class="auth-logo-link">
        <span class="auth-logo-icon">R</span>
        <span class="auth-logo-name">ReviseIQ</span>
      </a>

      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-tagline">Free forever. Track your progress and ace the Leaving Cert.</p>

        <div class="auth-error" id="authError" role="alert"></div>

        <form class="auth-form" id="signupForm" novalidate>

          <div class="auth-field">
            <label class="auth-label" for="firstName">First name</label>
            <input class="auth-input" type="text" id="firstName"
                   name="firstName" placeholder="Aoife"
                   autocomplete="given-name" required />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="lastName">Last name</label>
            <input class="auth-input" type="text" id="lastName"
                   name="lastName" placeholder="Murphy"
                   autocomplete="family-name" />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="email">Email address</label>
            <input class="auth-input" type="email" id="email"
                   name="email" placeholder="you@example.com"
                   autocomplete="email" required />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" type="password" id="password"
                   name="password" placeholder="At least 6 characters"
                   autocomplete="new-password" required minlength="6" />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="confirmPassword">Confirm password</label>
            <input class="auth-input" type="password" id="confirmPassword"
                   name="confirmPassword" placeholder="Re-enter password"
                   autocomplete="new-password" required />
          </div>

          <button class="auth-btn" type="submit" id="submitBtn">Create Account</button>

        </form>

        <div class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>

    </div>
  </main>

  <script src="auth.js"></script>
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.getSession()) {
        window.location.href = 'index.html';
        return;
      }

      const form      = document.getElementById('signupForm');
      const errorEl   = document.getElementById('authError');
      const submitBtn = document.getElementById('submitBtn');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const firstName       = document.getElementById('firstName').value.trim();
        const lastName        = document.getElementById('lastName').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
          showError('Passwords do not match.');
          return;
        }

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Creating account…';

        const result = await Auth.signup({ firstName, lastName, email, password });

        if (result.error) {
          showError(result.error);
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
